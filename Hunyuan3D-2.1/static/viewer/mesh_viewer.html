<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Mesh Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at 50% 60%, #1a2035 0%, #080b12 100%); }
  canvas { display: block; }
  #hud { position: fixed; top: 12px; left: 16px; color: #94a3b8;
    font: 12px/1.5 system-ui, sans-serif; pointer-events: none; user-select: none; }
  #loading { position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #94a3b8;
    font: 14px system-ui, sans-serif; gap: 12px; }
  #spinner { width: 36px; height: 36px; border: 3px solid #334155;
    border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error { display: none; position: fixed; inset: 0; align-items: center;
    justify-content: center; color: #f87171; font: 13px system-ui, sans-serif;
    padding: 32px; text-align: center; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="loading"><div id="spinner"></div><div id="loading-label">Loading mesh…</div></div>
<div id="error"></div>
<div id="hud">drag to orbit &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; right-drag to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const params = new URLSearchParams(location.search);
const glbURL = params.get("glb");

const loadingEl = document.getElementById("loading");
const loadLabel = document.getElementById("loading-label");
const errorEl   = document.getElementById("error");
function showError(msg) {
  loadingEl.style.display = "none";
  errorEl.style.display = "flex";
  errorEl.textContent = msg;
}

if (!glbURL) { showError("No ?glb= parameter provided."); }
else { init(glbURL); }

function init(url) {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(0, 0.4, 2.2);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Lighting so an untextured (shape-only) mesh reads as 3D.
  scene.add(new THREE.HemisphereLight(0xffffff, 0x333344, 1.1));
  const key = new THREE.DirectionalLight(0xffffff, 1.4); key.position.set(2, 3, 2); scene.add(key);
  const fill = new THREE.DirectionalLight(0x99aaff, 0.6); fill.position.set(-2, 1, -1); scene.add(fill);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.minDistance = 0.2;
  controls.maxDistance = 100;
  controls.autoRotate = true;          // immediately reads as 3D; stops on interaction
  controls.autoRotateSpeed = 2.2;
  controls.addEventListener("start", () => { controls.autoRotate = false; });

  const loader = new GLTFLoader();
  loader.load(url, (gltf) => {
    const root = gltf.scene;
    // If the mesh has no material/color (shape only), give it a neutral one.
    root.traverse((o) => {
      if (o.isMesh) {
        if (!o.material || (!o.material.map && o.material.color && o.material.color.equals(new THREE.Color(0,0,0)))) {
          o.material = new THREE.MeshStandardMaterial({ color: 0xcfd6e6, metalness: 0.05, roughness: 0.85, flatShading: false });
        }
        o.material.side = THREE.DoubleSide;
      }
    });
    // Frame to bounds.
    const box = new THREE.Box3().setFromObject(root);
    const center = new THREE.Vector3(); const size = new THREE.Vector3();
    box.getCenter(center); box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    root.position.sub(center);          // recenter to origin
    const dist = maxDim * 1.6;
    camera.position.set(dist * 0.35, maxDim * 0.25, dist);
    controls.target.set(0, 0, 0);
    controls.update();
    scene.add(root);
    loadingEl.style.display = "none";
  },
  (xhr) => { if (xhr.total) loadLabel.textContent = `Loading mesh (${(xhr.loaded/1048576).toFixed(1)} MB)…`; },
  (err) => showError("Failed to load mesh: " + (err?.message || err)));

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, camera); });
  setTimeout(() => { loadingEl.style.display = "none"; }, 8000);
}
</script>
</body>
</html>
